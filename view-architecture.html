<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StorageGRID Architecture</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; line-height: 1.6; color: #333; }
    h1 { border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
    h2 { margin-top: 1.5em; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
    pre { background: #f6f8fa; padding: 1em; border-radius: 6px; overflow-x: auto; }
    .mermaid { background: #fafafa; padding: 1em; border-radius: 6px; margin: 1em 0; text-align: center; }
    .error { color: #c00; padding: 1em; background: #fee; border-radius: 6px; }
    a { color: #0366d6; }
  </style>
</head>
<body>
  <div id="content">Loading ARCHITECTURE.md…</div>
  <script>
    const renderer = new marked.Renderer();
    const originalCode = renderer.code.bind(renderer);
    renderer.code = function(code, language) {
      if (language === 'mermaid') {
        return '<div class="mermaid">' + code + '</div>';
      }
      return originalCode(code, language);
    };

    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });

    fetch('ARCHITECTURE.md')
      .then(r => { if (!r.ok) throw new Error('Could not load ARCHITECTURE.md. Serve this folder with a local server (see instructions in the doc).'); return r.text(); })
      .then(md => {
        const html = marked.parse(md, { renderer });
        document.getElementById('content').innerHTML = html;
        return document.querySelectorAll('.mermaid');
      })
      .then(diagrams => {
        if (diagrams.length === 0) return;
        return Promise.all(Array.from(diagrams).map(el => mermaid.run({ nodes: [el] })));
      })
      .catch(err => {
        document.getElementById('content').innerHTML =
          '<p class="error"><strong>Error:</strong> ' + err.message + '</p>' +
          '<p>Run a local server from the repo root, then open this file in the browser. For example:</p>' +
          '<pre>python3 -m http.server 8000\n# or: npx serve .</pre>' +
          '<p>Then open: <a href="http://localhost:8000/view-architecture.html">http://localhost:8000/view-architecture.html</a></p>';
      });
  </script>
</body>
</html>
